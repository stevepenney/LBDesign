<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumberbank Cutlist Optimizer</title>
    <link rel="stylesheet" href="cutlist.css">
</head>
<body>
    <div class="container">
        <!-- Header with Logo -->
        <header class="header">
            <img src="Lumberbank-Primary-Logo.png" alt="Lumberbank" class="logo">
            <h1>Cutlist Optimizer</h1>
        </header>

        <!-- Job Details Section -->
        <section class="job-details">
            <h2>Job Details</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="jobNumber">Job Number</label>
                    <input type="text" id="jobNumber" maxlength="10" placeholder="e.g. 2601-125">
                </div>
                <div class="form-group">
                    <label for="jobDescription">Job Description</label>
                    <input type="text" id="jobDescription" maxlength="50" placeholder="e.g. House at 55 Some Street, Auckland">
                </div>
                <div class="form-group">
                    <label for="client">Client</label>
                    <input type="text" id="client" maxlength="50" placeholder="e.g. ABC Construction Ltd">
                </div>
                <div class="form-group">
                    <label for="preparedBy">Prepared By</label>
                    <input type="text" id="preparedBy" maxlength="20" placeholder="e.g. John">
                </div>
                <div class="form-group">
                    <label for="kerfWidth">Kerf Width (mm)</label>
                    <input type="number" id="kerfWidth" value="25" min="0" max="50">
                </div>
            </div>
        </section>

        <!-- CSV Input Section -->
        <section class="csv-input">
            <h2>Import Cuts</h2>
            <p class="instruction">Enter or paste comma-separated values: <strong>Member Name, Quantity, Length, Mark, Section</strong></p>
            <div class="csv-import-options">
                <div class="csv-textarea-container">
                    <textarea id="csvInput" rows="10" placeholder="Example:&#10;LIB 240.88s, 5, 2400 &#10;LIB 240.88s, 3, 1800&#10;190x45LVL8 ,4, 2100"></textarea>
                </div>
                <div class="csv-upload-container">
                    <label for="csvFileInput" class="btn btn-secondary">Upload CSV File</label>
                    <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
                    <span id="csvFileName" class="file-name"></span>
                </div>
            </div>
            <button id="parseBtn" class="btn btn-primary">Prepare cuts</button>
            <div id="skippedMembers" class="skipped-members" style="display: none;">
                <h3>⚠️ Maximum 5 member types reached. The following were skipped:</h3>
                <table id="skippedTable">
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Cuts (Length, Quantity)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <button id="copySkippedBtn" class="btn btn-secondary">Copy to Clipboard</button>
            </div>
        </section>

        <!-- Tabs Section -->
        <section class="tabs-section">
            <div class="tabs-header">
                <div id="tabsList" class="tabs-list"></div>
                <button id="addTabBtn" class="btn btn-add">+ Add Member</button>
            </div>
            
            <div id="tabsContent" class="tabs-content"></div>
        </section>

        <!-- Action Buttons -->
        <section class="actions">
            <button id="calculateAllBtn" class="btn btn-primary btn-large">Calculate All</button>
            <button id="advancedOptimizeBtn" class="btn btn-secondary btn-large" style="display: none;">Advanced Optimization</button>
            <button id="saveProjectBtn" class="btn btn-secondary btn-large">Save Project</button>
            <button id="loadProjectBtn" class="btn btn-secondary btn-large">Load Project</button>
            <input type="file" id="loadProjectInput" accept=".json" style="display: none;">
            <button id="printBtn" class="btn btn-secondary btn-large">Generate PDF</button>
        </section>

        <!-- Results Summary (hidden until calculated) -->
        <section id="summarySection" class="summary-section" style="display: none;">
            <h2>Summary</h2>
            <div id="summaryContent" class="summary-grid"></div>
        </section>
    </div>

    <!-- Cut Editor Modal (Feature 3) -->
    <div id="cutEditorModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeCutEditor()">
        <div class="modal-box">
            <h3>Edit Cut</h3>
            <p id="editCutHint" class="modal-hint"></p>
            <div class="form-group">
                <label for="editCutLength">Length (mm)</label>
                <input type="number" id="editCutLength" min="1">
            </div>
            <div class="form-group">
                <label for="editCutQuantity">Quantity</label>
                <input type="number" id="editCutQuantity" min="1">
            </div>
            <div class="form-group">
                <label for="editCutMark">Mark / ID</label>
                <input type="text" id="editCutMark" maxlength="10">
            </div>
            <div class="form-group">
                <label for="editCutGroup">Group</label>
                <input type="text" id="editCutGroup" maxlength="20">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveCutEdit()">Apply &amp; Re-optimise</button>
                <button class="btn btn-secondary" onclick="closeCutEditor()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="cutlist.js"></script>
</body>
</html>
